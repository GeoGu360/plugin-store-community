schema_version: 1
name: marinade
version: "0.1.0"
description: "Marinade Finance liquid staking on Solana — stake SOL to earn mSOL staking rewards"
author:
  name: "GeoGu360"
  github: "GeoGu360"
category: defi-protocol
tags:
  - liquid-staking
  - solana
  - msol
  - defi
license: MIT

components:
  skill:
    dir: skills/marinade

build:
