schema_version: 1
name: compound-v3
version: "0.1.0"
description: "Compound V3 (Comet) lending plugin: supply collateral, borrow/repay the base asset, and claim COMP rewards across Ethereum, Base, Arbitrum, and Polygon."
author:
  name: "skylavis-sky"
  github: "skylavis-sky"
category: defi-protocol
tags:
  - lending
  - borrowing
  - defi
  - compound
  - comet
license: MIT

components:
  skill:
    dir: skills/compound-v3

build:
  lang: rust
  binary_name: compound-v3
  source_repo: GeoGu360/onchainos-plugins
  source_commit: "20e55b656c7614191e412582d4709f6a16068f4f"
  source_dir: compound-v3

api_calls:
  - "https://ethereum.publicnode.com"
  - "https://base-rpc.publicnode.com"
  - "https://arb1.arbitrum.io/rpc"
  - "https://polygon-rpc.com"
